name: Elastic Plugin Evals

on:
  push:
    branches: [main]
    paths:
      - "showcase/elastic-cursor-plugin/**"
      - "src/**"
  pull_request:
    paths:
      - "showcase/elastic-cursor-plugin/**"
      - "src/**"
  workflow_dispatch:

env:
  ELASTIC_PLUGIN_DIR: ${{ github.workspace }}/elastic-cursor-plugin
  ES_API_KEY: ${{ secrets.ES_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  static-unit:
    name: Static + Unit + Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - uses: actions/checkout@v4
        with:
          repository: elastic/elastic-cursor-plugin
          path: elastic-cursor-plugin

      - name: Build plugin
        working-directory: elastic-cursor-plugin
        run: npm ci && npm run build

      - name: Run static layer
        run: npx cursor-plugin-evals run --config showcase/elastic-cursor-plugin/plugin-eval.yaml --layer static --ci

      - name: Run unit layer
        run: npx cursor-plugin-evals run --config showcase/elastic-cursor-plugin/plugin-eval.yaml --layer unit --ci

      - name: Run conformance layer
        run: npx cursor-plugin-evals run --config showcase/elastic-cursor-plugin/plugin-eval.yaml --layer conformance --ci --report tap --output conformance.tap

      - name: Cross-platform compatibility check
        run: npx cursor-plugin-evals compat --dir ${{ env.ELASTIC_PLUGIN_DIR }}

      - name: Security audit (3-pass)
        run: npx cursor-plugin-evals audit --config showcase/elastic-cursor-plugin/plugin-eval.yaml --ci

      - name: Upload conformance TAP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-tap
          path: conformance.tap

  integration-performance:
    name: Integration + Performance
    runs-on: ubuntu-latest
    needs: static-unit
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0-SNAPSHOT
        ports:
          - 9220:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      kibana:
        image: docker.elastic.co/kibana/kibana:9.4.0-SNAPSHOT
        ports:
          - 5620:5601
        env:
          ELASTICSEARCH_HOSTS: http://elasticsearch:9200
        options: >-
          --health-cmd "curl -f http://localhost:5601/api/status"
          --health-interval 15s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - uses: actions/checkout@v4
        with:
          repository: elastic/elastic-cursor-plugin
          path: elastic-cursor-plugin

      - name: Build plugin
        working-directory: elastic-cursor-plugin
        run: npm ci && npm run build

      - name: Run integration layer
        run: npx cursor-plugin-evals run --config showcase/elastic-cursor-plugin/plugin-eval.yaml --layer integration --ci --report junit-xml --output integration-results.xml

      - name: Run integration (TAP format)
        run: npx cursor-plugin-evals run --config showcase/elastic-cursor-plugin/plugin-eval.yaml --layer integration --ci --report tap --output integration.tap

      - name: Run performance layer
        run: npx cursor-plugin-evals run --config showcase/elastic-cursor-plugin/plugin-eval.yaml --layer performance --ci --report junit-xml --output performance-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            *.xml
            *.tap

  llm-eval:
    name: LLM Evaluation
    runs-on: ubuntu-latest
    needs: static-unit
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0-SNAPSHOT
        ports:
          - 9220:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        options: >-
          --health-cmd "curl -f http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - uses: actions/checkout@v4
        with:
          repository: elastic/elastic-cursor-plugin
          path: elastic-cursor-plugin

      - name: Build plugin
        working-directory: elastic-cursor-plugin
        run: npm ci && npm run build

      - name: Run LLM eval layer
        run: npx cursor-plugin-evals run --config showcase/elastic-cursor-plugin/plugin-eval.yaml --layer llm --ci --report markdown --output llm-report.md

      - name: Run TypeScript eval suites
        run: npx cursor-plugin-evals run --ts showcase/elastic-cursor-plugin/showcase.eval.ts --ci --report json --output ts-results.json

      - name: Quality score
        run: npx cursor-plugin-evals score --config showcase/elastic-cursor-plugin/plugin-eval.yaml

      - name: Generate leaderboard
        run: npx cursor-plugin-evals leaderboard --format markdown --output leaderboard.md

      - name: Upload LLM report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-report
          path: |
            llm-report.md
            ts-results.json
            leaderboard.md
