<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F1A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="50%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#74B9FF"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A29BFE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#74B9FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="check-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#69F0AE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6C5CE7" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-filter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="80" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#A29BFE" stroke-width="1">
    <line x1="96" y1="16" x2="96" y2="496"/>
    <line x1="176" y1="16" x2="176" y2="496"/>
    <line x1="256" y1="16" x2="256" y2="496"/>
    <line x1="336" y1="16" x2="336" y2="496"/>
    <line x1="416" y1="16" x2="416" y2="496"/>
    <line x1="16" y1="96" x2="496" y2="96"/>
    <line x1="16" y1="176" x2="496" y2="176"/>
    <line x1="16" y1="256" x2="496" y2="256"/>
    <line x1="16" y1="336" x2="496" y2="336"/>
    <line x1="16" y1="416" x2="496" y2="416"/>
  </g>

  <!-- Ambient glow -->
  <circle cx="256" cy="240" r="140" fill="url(#glow)"/>

  <!-- Shield shape -->
  <g filter="shadow">
    <path d="M256 100 L370 160 L370 290 C370 350 320 400 256 420 C192 400 142 350 142 290 L142 160 Z"
          fill="url(#bg)" stroke="url(#accent)" stroke-width="3"/>
  </g>

  <!-- Inner shield highlight -->
  <path d="M256 120 L354 172 L354 286 C354 338 310 382 256 400 C202 382 158 338 158 286 L158 172 Z"
        fill="none" stroke="url(#accent)" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Four-layer bars inside shield -->
  <g filter="glow-filter">
    <rect x="196" y="180" width="120" height="16" rx="8" fill="#6C5CE7" opacity="0.9"/>
    <rect x="196" y="212" width="100" height="16" rx="8" fill="#A29BFE" opacity="0.8"/>
    <rect x="196" y="244" width="80" height="16" rx="8" fill="#74B9FF" opacity="0.7"/>
    <rect x="196" y="276" width="60" height="16" rx="8" fill="#00E676" opacity="0.8"/>
  </g>

  <!-- Checkmark overlay -->
  <g filter="glow-filter">
    <path d="M230 320 L252 342 L298 280"
          stroke="url(#check-grad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Cursor bracket accent (top-left) -->
  <path d="M100 130 L80 130 L80 180" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Cursor bracket accent (bottom-right) -->
  <path d="M412 380 L432 380 L432 330" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- EVALS text at bottom -->
  <text x="256" y="460" text-anchor="middle" font-family="Courier New, Courier, monospace"
        font-size="28" font-weight="600" letter-spacing="6" fill="url(#accent)">EVALS</text>
</svg>
