  <rect x="44" y="55" width="33" height="7" rx="3.5" fill="#A29BFE"/>
  <rect x="44" y="66" width="26" height="7" rx="3.5" fill="#74B9FF"/>
  <rect x="44" y="77" width="19" height="7" rx="3.5" fill="#00E676"/>

  <!-- Check -->
  <path d="M50 92 L58 100 L76 78" stroke="url(#check)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
