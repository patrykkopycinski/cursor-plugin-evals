name: github-server
layer: integration
require_env:
  - GITHUB_TOKEN

tests:
  - name: search-repositories
    tool: search_repositories
    args:
      query: "kubernetes language:go"
    assert:
      - field: content[0].text
        op: exists
      - field: content[0].type
        op: eq
        value: text

  - name: list-repos
    tool: list_repos
    args:
      owner: octocat
    assert:
      - field: content[0].text
        op: exists

  - name: get-file-contents
    tool: get_file_contents
    args:
      owner: octocat
      repo: Hello-World
      path: README
    assert:
      - field: content[0].text
        op: exists

  - name: get-file-contents-readme
    tool: get_file_contents
    args:
      owner: kubernetes
      repo: kubernetes
      path: README.md
    assert:
      - field: content[0].text
        op: contains
        value: Kubernetes

  - name: get-issue
    tool: get_issue
    args:
      owner: octocat
      repo: Hello-World
      issue_number: 1
    assert:
      - field: content[0].text
        op: exists
      - field: content[0].type
        op: eq
        value: text

  - name: list-issues
    tool: list_issues
    args:
      owner: octocat
      repo: Hello-World
      state: all
    assert:
      - field: content[0].text
        op: exists

  - name: create-issue
    tool: create_issue
    args:
      owner: test-owner
      repo: test-repo
      title: "Test issue from eval"
      body: "Automated test"
    assert:
      - field: content[0].text
        op: exists

  - name: search-code
    tool: search_code
    args:
      query: "console.log repo:octocat/Hello-World"
    assert:
      - field: content[0].text
        op: exists

  - name: list-branches
    tool: list_branches
    args:
      owner: octocat
      repo: Hello-World
    assert:
      - field: content[0].text
        op: exists

  - name: get-pull-request
    tool: get_pull_request
    args:
      owner: octocat
      repo: Hello-World
      pull_number: 1
    assert:
      - field: content[0].text
        op: exists

  - name: list-commits
    tool: list_commits
    args:
      owner: octocat
      repo: Hello-World
    assert:
      - field: content[0].text
        op: exists

  - name: create-pull-request
    tool: create_pull_request
    args:
      owner: test-owner
      repo: test-repo
      title: "Test PR from eval"
      body: "Automated test PR"
      head: feature-branch
      base: main
    assert:
      - field: content[0].text
        op: exists

  - name: get-nonexistent-issue
    tool: get_issue
    args:
      owner: octocat
      repo: Hello-World
      issue_number: 999999999
    expect_error: true

  - name: get-nonexistent-repo-file
    tool: get_file_contents
    args:
      owner: octocat
      repo: Hello-World
      path: this/file/does/not/exist.txt
    expect_error: true
