name: my-server-tests
layer: integration

tests:
  - name: example-tool-call
    tool: my_tool
    args:
      param: value
    assert:
      - field: content[0].text
        op: exists

  - name: example-error-handling
    tool: my_tool
    args: {}
    expect_error: true
