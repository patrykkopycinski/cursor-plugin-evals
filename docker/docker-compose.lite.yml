version: "3.8"

services:
  obs-es:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: cpe-obs-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=changeme
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.http.ssl.enabled=false
      - xpack.license.self_generated.type=trial
    ports:
      - "9210:9200"
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:changeme http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  obs-kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: cpe-obs-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://obs-es:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=changeme
      - xpack.security.enabled=true
      - xpack.encryptedSavedObjects.encryptionKey=a]3{~+FY-90bcd1234ef5678abcde90f
      - server.host=0.0.0.0
    ports:
      - "5601:5601"
    networks:
      - obs-net
    depends_on:
      obs-es:
        condition: service_healthy

  edot-collector:
    image: docker.elastic.co/beats/elastic-agent:8.17.0
    container_name: cpe-edot-collector
    volumes:
      - ./edot-collector.yml:/etc/otelcol/config.yaml:ro
    command: ["otel-collector", "--config", "/etc/otelcol/config.yaml"]
    ports:
      - "4318:4318"
    networks:
      - obs-net
    depends_on:
      obs-es:
        condition: service_healthy

networks:
  obs-net:
    driver: bridge
